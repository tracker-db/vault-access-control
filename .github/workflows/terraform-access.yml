# .github/workflows/terraform-access.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PR  → terraform plan  (comment on PR with diff)
# Merge to main → terraform apply (update Vault)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: User Access Management

on:
  pull_request:
    paths:
      - 'roles.tf'
      - 'users.tf'
      - 'service-accounts.tf'
      - 'principals.tf'
      - 'main.tf'
      - 'modules/**'
  push:
    branches:
      - main
    paths:
      - 'roles.tf'
      - 'users.tf'
      - 'service-accounts.tf'
      - 'principals.tf'
      - 'main.tf'
      - 'modules/**'

env:
  TF_VERSION: "1.7.0"
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

# Ensure only one apply runs at a time
concurrency:
  group: terraform-access
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # PR: Plan and comment
  # ──────────────────────────────────────────────
  plan:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted  # Your RedHat build server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;

            const body = `## Terraform Plan — User Access Changes

            \`\`\`
            ${truncated}
            \`\`\`

            **Status:** ${{ steps.plan.outcome }}

            > ⚠️ Merging this PR will apply these changes to Vault.
            > Review carefully — this controls SSH access to production VMs.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ──────────────────────────────────────────────
  # Merge to main: Apply
  # ──────────────────────────────────────────────
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted  # Your RedHat build server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

      - name: Sync Principals to Target VMs
        run: ./scripts/sync-principals.sh

      - name: Commit Generated Principals Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add principals.d/
          git diff --cached --quiet || git commit -m "chore: auto-update principals.d from roles.tf"
          git push

      - name: Output Access Summary
        run: |
          echo "=== User Access Matrix ==="
          terraform output -json user_access_matrix | jq .
          echo ""
          echo "=== Service Account Matrix ==="
          terraform output -json service_account_matrix | jq .
          echo ""
          echo "=== Principals by Host ==="
          terraform output -json principals_summary | jq .
