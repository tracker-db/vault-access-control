---
# Ansible inventory
#
# Groups:
#   bastions     — bastion2, bastion0 (key auth, user ej)
#   anydesk      — blue-anydesk (password auth, ProxyJump)
#   core-servers — util, green, blue (password auth, ProxyJump)
#
# Runtime variables:
#   anydesk_ssh_password   — ej password on anydesk servers
#   core_server_password   — ej password on core-servers
#
#   ansible-playbook sync-os-users.yml -i inventory.yml \
#     --extra-vars "anydesk_ssh_password=<pw> core_server_password=<pw>"

bastions:
  hosts:
    bastion2:
      ansible_host: ssh.auto-deploy.net
      ansible_user: ej
      ansible_become: true
      ansible_become_method: sudo
      ansible_ssh_private_key_file: ~/.ssh/user51
    bastion0:
      ansible_host: 192.168.2.100
      ansible_user: ej
      ansible_become: true
      ansible_become_method: sudo
      ansible_ssh_private_key_file: ~/.ssh/user51

anydesk:
  hosts:
    blue-anydesk:
      ansible_host: 192.168.3.91
      ansible_user: ej
      ansible_become: true
      ansible_become_method: sudo
      ansible_password: "{{ anydesk_ssh_password }}"
      ansible_ssh_common_args: '-o ProxyJump=ssh.auto-deploy.net -o StrictHostKeyChecking=no'
    # green-anydesk:                      # down — add when back online
    #   ansible_host: <TBD>
    #   ansible_user: ej
    #   ansible_become: true
    #   ansible_become_method: sudo
    #   ansible_password: "{{ anydesk_ssh_password }}"
    #   ansible_ssh_common_args: '-o ProxyJump=ssh.auto-deploy.net -o StrictHostKeyChecking=no'

core-servers:
  # util, green, blue — internal LAN servers
  # ej is current service account (transitioning to app-service)
  # Password: core_server_password (passed at runtime)
  vars:
    ansible_user: ej
    ansible_become: true
    ansible_become_method: sudo
    ansible_password: "{{ core_server_password }}"
    ansible_ssh_common_args: '-o ProxyJump=ssh.auto-deploy.net -o StrictHostKeyChecking=no -o PreferredAuthentications=password'
  hosts:
    util:
      ansible_host: 192.168.2.97
    green:
      ansible_host: 192.168.2.120
    blue:
      ansible_host: 192.168.3.120
