---
# sync-os-users.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Enforce OS user state on all servers from Terraform-generated manifest.
#
# Source of truth: vault-users.tf + linux-service-accounts.tf (Terraform)
# Manifest:        scripts/users.auto.yml (generated by terraform apply)
#
# Usage:
#   Dry run:  ansible-playbook sync-os-users.yml -i inventory.yml --check --diff \
#               --extra-vars "anydesk_ssh_password=<password>"
#   Apply:    ansible-playbook sync-os-users.yml -i inventory.yml \
#               --extra-vars "anydesk_ssh_password=<password>"
#
# Prerequisites:
#   - terraform apply has run (writes users.auto.yml)
#   - Valid Vault SSH certificate: run scripts/engineer-ssh-login.sh first
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Vault users — all servers (bastions + anydesk) ───────
- name: Sync Vault users on all servers
  hosts: bastions,anydesk
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create and unlock enabled vault users
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password_lock: false
      loop: "{{ vault_users | dict2items }}"
      when: item.value.status == 'enabled'

    - name: Lock disabled vault users (skip if account does not exist)
      ansible.builtin.user:
        name: "{{ item.key }}"
        password_lock: true
      loop: "{{ vault_users | dict2items }}"
      when:
        - item.value.status == 'disabled'
        - item.key in ansible_facts.getent_passwd

    - name: Delete removed vault users and home directories
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: absent
        remove: true
        force: true
      loop: "{{ vault_users | dict2items }}"
      when:
        - item.value.status == 'removed'
        - item.key in ansible_facts.getent_passwd

# ── Service accounts — bastions only ─────────────────────
- name: Sync OS service accounts on bastions only
  hosts: bastions
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create and keep enabled service accounts
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password_lock: false
      loop: "{{ service_accounts | dict2items }}"
      when: item.value.status == 'enabled'

    - name: Delete removed service accounts and home directories
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: absent
        remove: true
        force: true
      loop: "{{ service_accounts | dict2items }}"
      when:
        - item.value.status == 'removed'
        - item.key in ansible_facts.getent_passwd

# ── Core servers — util, green, blue ─────────────────────
- name: Sync users and app-service on core-servers
  hosts: core-servers
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

    - name: Fetch app-service password from Vault KV
      ansible.builtin.shell: |
        vault kv get -field=password secret/shared/app-service/credentials
      delegate_to: localhost
      run_once: true
      check_mode: false
      no_log: true
      register: _vault_app_service_pass
      environment:
        VAULT_ADDR: "{{ lookup('env', 'VAULT_ADDR') }}"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"

  tasks:
    - name: Create and unlock vault users on core-servers
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password_lock: false
      loop: "{{ vault_users | dict2items }}"
      when: item.value.status == 'enabled'

    - name: Create app-service account with Vault-managed password
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password: "{{ _vault_app_service_pass.stdout | password_hash('sha512') }}"
        password_lock: false
      loop: "{{ core_service_accounts | dict2items }}"
      when: item.value.status == 'enabled'

    - name: Delete removed core service accounts
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: absent
        remove: true
        force: true
      loop: "{{ core_service_accounts | dict2items }}"
      when:
        - item.value.status == 'removed'
        - item.key in ansible_facts.getent_passwd

# ── util only ────────────────────────────────────────────
- name: Sync service accounts on util
  hosts: util
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create and manage service accounts on util
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password_lock: false
      loop: "{{ util_service_accounts | dict2items }}"
      when:
        - item.value.status == 'enabled'
        - item.value.type == 'service'

    - name: Verify package-managed accounts on util (mysql — do not override shell)
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
      loop: "{{ util_service_accounts | dict2items }}"
      when:
        - item.value.status == 'enabled'
        - item.value.type == 'package'

# ── green + blue — libvirt-qemu ──────────────────────────
- name: Verify libvirt-qemu service account on green and blue
  hosts: green,blue
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Verify package-managed accounts (libvirt-qemu — do not override shell)
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
      loop: "{{ libvirt_service_accounts | dict2items }}"
      when:
        - item.value.status == 'enabled'
        - item.value.type == 'package'
