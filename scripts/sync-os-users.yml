---
# sync-os-users.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Enforce OS user state on all servers from Terraform-generated manifest.
#
# Source of truth: vault-users.tf + linux-service-accounts.tf (Terraform)
# Manifest:        scripts/users.auto.yml (generated by terraform apply)
#
# Usage:
#   Dry run:  ansible-playbook scripts/sync-os-users.yml -i scripts/inventory.yml \
#               --check --diff \
#               --extra-vars "anydesk_ssh_password=<pw> core_server_password=<pw>"
#   Apply:    ansible-playbook scripts/sync-os-users.yml -i scripts/inventory.yml \
#               --extra-vars "anydesk_ssh_password=<pw> core_server_password=<pw>"
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Vault users — bastions + anydesk ────────────────────
- name: Sync vault users on bastions and anydesk
  hosts: bastions,anydesk
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create enabled vault users
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
      loop: "{{ vault_users | dict2items | selectattr('value.status', 'equalto', 'enabled') | list }}"

    - name: Deploy authorized_keys for users with device keys
      ansible.posix.authorized_key:
        user: "{{ item.0.key }}"
        key: "{{ item.1 }}"
        state: present
      loop: "{{ vault_users | dict2items | selectattr('value.authorized_keys', 'defined') | selectattr('value.authorized_keys', 'ne', []) | subelements('value.authorized_keys') }}"
      when: item.0.value.status == 'enabled'

    - name: Lock disabled vault users (only if account exists)
      ansible.builtin.user:
        name: "{{ item.key }}"
        password_lock: true
      loop: "{{ vault_users | dict2items | selectattr('value.status', 'equalto', 'disabled') | list }}"
      when: item.key in ansible_facts.getent_passwd

    - name: Delete removed vault users
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: absent
        remove: true
        force: true
      loop: "{{ vault_users | dict2items | selectattr('value.status', 'equalto', 'removed') | list }}"
      when: item.key in ansible_facts.getent_passwd

# ── Service accounts — bastions only ────────────────────
- name: Sync OS service accounts on bastions
  hosts: bastions
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create enabled service accounts
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
      loop: "{{ service_accounts | dict2items | selectattr('value.status', 'equalto', 'enabled') | list }}"

    - name: Delete removed service accounts
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: absent
        remove: true
        force: true
      loop: "{{ service_accounts | dict2items | selectattr('value.status', 'equalto', 'removed') | list }}"
      when: item.key in ansible_facts.getent_passwd

# ── Core servers — util, green, blue ────────────────────
- name: Sync vault users and app-service on core_servers
  hosts: core_servers
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

    - name: Fetch app-service password from Vault KV
      ansible.builtin.shell: |
        vault kv get -field=password secret/shared/app-service/credentials
      delegate_to: localhost
      run_once: true
      check_mode: false
      changed_when: false
      no_log: true
      register: _vault_app_service_pass
      environment:
        VAULT_ADDR: "{{ lookup('env', 'VAULT_ADDR') }}"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"

  tasks:
    - name: Create enabled vault users
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
      loop: "{{ vault_users | dict2items | selectattr('value.status', 'equalto', 'enabled') | list }}"

    - name: Create app-service with Vault-managed password
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password: "{{ _vault_app_service_pass.stdout | password_hash('sha512') }}"
        update_password: on_create
      loop: "{{ core_service_accounts | dict2items | selectattr('value.status', 'equalto', 'enabled') | list }}"

    - name: Grant app-service passwordless sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/app-service
        content: "app-service ALL=(ALL) NOPASSWD: ALL\n"
        owner: root
        group: root
        mode: '0440'
        validate: visudo -cf %s

    - name: Delete removed core service accounts
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: absent
        remove: true
        force: true
      loop: "{{ core_service_accounts | dict2items | selectattr('value.status', 'equalto', 'removed') | list }}"
      when: item.key in ansible_facts.getent_passwd

# ── util only ────────────────────────────────────────────
- name: Sync service accounts on util
  hosts: util
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create managed service accounts on util
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
      loop: "{{ util_service_accounts | dict2items | selectattr('value.status', 'equalto', 'enabled') | selectattr('value.type', 'equalto', 'service') | list }}"

    - name: Verify package-managed accounts on util
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
      loop: "{{ util_service_accounts | dict2items | selectattr('value.status', 'equalto', 'enabled') | selectattr('value.type', 'equalto', 'package') | list }}"

# ── green + blue — libvirt-qemu ──────────────────────────
- name: Verify libvirt-qemu on green and blue
  hosts: green,blue
  become: true
  vars_files:
    - users.auto.yml

  tasks:
    - name: Verify package-managed accounts
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
      loop: "{{ libvirt_service_accounts | dict2items | selectattr('value.status', 'equalto', 'enabled') | selectattr('value.type', 'equalto', 'package') | list }}"
