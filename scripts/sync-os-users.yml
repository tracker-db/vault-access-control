---
# sync-os-users.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Enforce OS user state on all servers from Terraform-generated manifest.
#
# Source of truth: users.tf (Terraform)
# Manifest:        scripts/users.auto.yml (generated by terraform apply)
#
# Usage:
#   Dry run (see what would change):
#     ansible-playbook scripts/sync-os-users.yml -i scripts/inventory.yml --check --diff
#
#   Apply:
#     ansible-playbook scripts/sync-os-users.yml -i scripts/inventory.yml
#
# Prerequisites:
#   - terraform apply has run (writes users.auto.yml)
#   - Valid Vault SSH certificate: run scripts/engineer-ssh-login.sh first
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

- name: Sync OS users from Vault RBAC manifest
  hosts: bastions
  become: true
  vars_files:
    - users.auto.yml

  pre_tasks:
    - name: Collect existing OS accounts
      ansible.builtin.getent:
        database: passwd

  tasks:
    - name: Create and unlock enabled users
      ansible.builtin.user:
        name: "{{ item.key }}"
        state: present
        shell: /bin/bash
        create_home: true
        password_lock: false
      loop: "{{ vault_users | dict2items }}"
      when: item.value.status == 'enabled'

    - name: Lock disabled users (skip if account does not exist on this server)
      ansible.builtin.user:
        name: "{{ item.key }}"
        password_lock: true
      loop: "{{ vault_users | dict2items }}"
      when:
        - item.value.status == 'disabled'
        - item.key in ansible_facts.getent_passwd
